name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - release
      - master
  push:
    branches:
      - release
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Set Environment
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/master" ] || [ "${{ github.base_ref }}" = "master" ]; then
            echo "environment=Production" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/release" ] || [ "${{ github.base_ref }}" = "release" ]; then
            echo "environment=Staging" >> "$GITHUB_OUTPUT"
          else
            echo "environment=" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Node Setup
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.0

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node Setup
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.0

      - name: Restore Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Type Check
        run: NODE_OPTIONS="--max-old-space-size=8192" pnpm run ts

  lint-check:
    name: Lint Check
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node Setup
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.0

      - name: Restore Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Lint Check
        run: NODE_OPTIONS="--max-old-space-size=8192" pnpm run lint

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - setup
      - type-check
      - lint-check
    if: github.event_name == 'push' && needs.setup.outputs.environment != ''
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Staging
        if: ${{ needs.setup.outputs.environment == 'Staging' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_TOKEN }}
        run: flyctl deploy --wg=false --no-cache --local-only --config ./fly.io/staging/app.toml

      - name: Deploy to Production
        if: ${{ needs.setup.outputs.environment == 'Production' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_TOKEN }}
        run: flyctl deploy --wg=false --no-cache --local-only --config ./fly.io/production/app.toml
